<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIXTON — Расписание</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Mulish:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--gold:#c9a84c;--text:#f0ede8;--text-dim:#8a8580;--text-mid:#b5b0a8;--green:#3ecf6e;--red:#e05252}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Mulish',sans-serif;font-size:14px}
header{display:flex;align-items:center;justify-content:space-between;padding:18px 28px 14px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100}
.logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;color:var(--gold)}
.header-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px}
.branch-label{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--text-mid)}
.clock{font-size:13px;color:var(--text-dim)}
.date-bar{padding:10px 28px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.date-label{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--gold)}
.day-btns{display:flex;gap:6px;margin-left:auto}
.day-btn{font-family:'Mulish',sans-serif;font-size:11px;padding:4px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text-dim);cursor:pointer;transition:all 0.2s}
.day-btn.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
#board{display:grid;gap:1px;background:var(--border);min-height:calc(100vh - 120px)}
.col{background:var(--bg);display:flex;flex-direction:column}
.col-header{padding:14px 16px 12px;background:var(--bg2);border-bottom:2px solid var(--gold);position:sticky;top:74px;z-index:50}
.master-name{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:2px;color:var(--text)}
.master-count{font-size:11px;color:var(--text-dim);margin-top:3px}
.cards{padding:10px;display:flex;flex-direction:column;gap:7px}
.card{background:var(--bg3);border-radius:10px;border:1px solid var(--border);padding:10px 12px;position:relative}
.card.sv{border-left:3px solid var(--green)}
.card.sc{border-left:3px solid var(--red);opacity:0.55}
.card.sp{border-left:3px solid var(--border2)}
.card.now{border-color:var(--gold);background:rgba(201,168,76,0.06)}
.card-time{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);line-height:1;margin-bottom:4px}
.card.now .card-time{color:#fff}
.card-client{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.card-service{font-size:11px;color:var(--text-mid);line-height:1.45}
.card-icon{position:absolute;top:10px;right:10px;font-size:12px}
#loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:16px;color:var(--text-dim)}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#err{display:none;padding:40px 28px;color:var(--red);font-size:13px}
</style>
</head>
<body>
<header>
  <div class="logo">BRIXTON</div>
  <div class="header-right">
    <div class="branch-label" id="bl">—</div>
    <div class="clock" id="cl">—</div>
  </div>
</header>
<div class="date-bar">
  <div class="date-label" id="dl">—</div>
  <div class="day-btns">
    <button class="day-btn" onclick="setDay(-1)">Вчера</button>
    <button class="day-btn active" onclick="setDay(0)">Сегодня</button>
    <button class="day-btn" onclick="setDay(1)">Завтра</button>
  </div>
</div>
<div id="loading"><div class="spinner"></div><span>Загружаем расписание…</span></div>
<div id="err"></div>
<div id="board" style="display:none"></div>
<script>
var API='https://script.google.com/macros/s/AKfycbyqfD8xsp2rkX0eEASg2FoYXbtYpzXlC4TeXoS09RRDjvLDAG6UCNQqcLodVWG5oebzdA/exec';
var BR={mendeleeva:{name:'Менделеева',cid:'694866'},entuziastov:{name:'Энтузиастов',cid:'1076318'}};
var p=new URLSearchParams(location.search);
var bk=(p.get('branch')||'mendeleeva').toLowerCase();
var br=BR[bk]||BR.mendeleeva;
var dayOffset=0;
document.getElementById('bl').textContent=br.name;
function getTargetDate(offset){var d=new Date();d.setDate(d.getDate()+offset);return d;}
function formatDate(d){var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0');return y+'-'+m+'-'+day;}
function tick(){
  var n=new Date();
  document.getElementById('cl').textContent=n.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  var t=getTargetDate(dayOffset);
  var d=t.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('dl').textContent=d.charAt(0).toUpperCase()+d.slice(1);
}
tick();setInterval(tick,1000);
function setDay(offset){
  dayOffset=offset;
  document.querySelectorAll('.day-btn').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.day-btn')[offset+1].classList.add('active');
  load();
}
function si(v){if(v===1)return{c:'sv',i:'🟢'};if(v===-1)return{c:'sc',i:'🔴'};return{c:'sp',i:'⚪'};}
function isNow(t){
  if(dayOffset!==0)return false;
  var n=new Date(),a=t.split(':').map(Number),s=new Date(n);
  s.setHours(a[0],a[1],0,0);
  return n>=s&&n<new Date(s.getTime()+3600000);
}
function render(list){
  var b=document.getElementById('board');
  b.innerHTML='';
  if(!list||!list.length){
    b.style.gridTemplateColumns='1fr';
    b.innerHTML='<div style="padding:40px 28px;color:var(--text-dim)">Нет записей</div>';
    return;
  }
  var cols=Math.min(list.length,5);
  b.style.gridTemplateColumns='repeat('+cols+',1fr)';
  list.forEach(function(s){
    var col=document.createElement('div');col.className='col';
    var h=document.createElement('div');h.className='col-header';
    h.innerHTML='<div class="master-name">'+s.name+'</div><div class="master-count">'+s.appointments.length+' записей</div>';
    col.appendChild(h);
    var cs=document.createElement('div');cs.className='cards';
    if(!s.appointments.length){
      cs.innerHTML='<div style="padding:20px;color:var(--text-dim);text-align:center;font-size:12px">Нет записей</div>';
    } else {
      s.appointments.forEach(function(a){
        var st=si(a.visit),now=isNow(a.time),svc=(a.services||[]).join(', ')||'—';
        var c=document.createElement('div');
        c.className='card '+st.c+(now?' now':'');
        c.innerHTML='<div class="card-time">'+a.time+'</div><div class="card-client">'+a.clientName+'</div><div class="card-service">'+svc+'</div><div class="card-icon">'+st.i+'</div>';
        cs.appendChild(c);
      });
    }
    col.appendChild(cs);b.appendChild(col);
  });
}
function load(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('board').style.display='none';
  document.getElementById('err').style.display='none';
  var date=formatDate(getTargetDate(dayOffset));
  fetch(API+'?action=getTodaySchedule&company_id='+br.cid+'&date='+date)
  .then(function(r){return r.json();})
  .then(function(j){
    document.getElementById('loading').style.display='none';
    document.getElementById('board').style.display='grid';
    render(j.data||[]);
  })
  .catch(function(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('err').style.display='block';
    document.getElementById('err').textContent='Ошибка: '+e.message;
  });
}
load();setInterval(load,60000);
</script>
</body>
</html>
