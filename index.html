<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIXTON — Расписание</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Mulish:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --bg2: #161616; --bg3: #1e1e1e;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --gold: #c9a84c; --text: #f0ede8; --text-dim: #8a8580; --text-mid: #b5b0a8;
    --green: #3ecf6e; --red: #e05252; --card-r: 10px; --col-min: 220px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Mulish', sans-serif; font-size: 14px; overflow-x: hidden; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 18px 28px 14px; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 4px; color: var(--gold); line-height: 1; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .branch-label { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 3px; color: var(--text-mid); }
  .clock { font-size: 13px; color: var(--text-dim); font-weight: 300; }
  .date-bar { padding: 10px 28px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; }
  .date-label { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; color: var(--gold); }
  .refresh-indicator { font-size: 11px; color: var(--text-dim); font-weight: 300; margin-left: auto; }
  .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-right: 5px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  #board { display: grid; grid-template-columns: repeat(auto-fill, minmax(var(--col-min), 1fr)); gap: 1px; background: var(--border); min-height: calc(100vh - 110px); }
  .col { background: var(--bg); display: flex; flex-direction: column; }
  .col-header { padding: 14px 16px 12px; background: var(--bg2); border-bottom: 2px solid var(--gold); position: sticky; top: 74px; z-index: 50; }
  .master-name { font-family: 'Bebas Neue', sans-serif; font-size: 19px; letter-spacing: 2px; color: var(--text); line-height: 1; }
  .master-count { font-size: 11px; color: var(--text-dim); font-weight: 300; margin-top: 3px; }
  .cards { padding: 10px 10px 16px; display: flex; flex-direction: column; gap: 7px; }
  .card { background: var(--bg3); border-radius: var(--card-r); border: 1px solid var(--border); padding: 10px 12px 11px; position: relative; }
  .card.status-visited { border-left: 3px solid var(--green); padding-left: 10px; }
  .card.status-cancelled { border-left: 3px solid var(--red); padding-left: 10px; opacity: 0.55; }
  .card.status-pending { border-left: 3px solid var(--border2); padding-left: 10px; }
  .card.is-now { border-color: var(--gold); background: rgba(201,168,76,0.06); }
  .card-time { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; color: var(--gold); line-height: 1; margin-bottom: 4px; }
  .card.is-now .card-time { color: #fff; }
  .card-client { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
  .card-service { font-size: 11px; color: var(--text-mid); font-weight: 300; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .card-status { position: absolute; top: 10px; right: 10px; font-size: 12px; }
  .empty-col { padding: 20px 16px; color: var(--text-dim); font-size: 12px; text-align: center; opacity: 0.6; }
  #loading { display: flex; align-items: center; justify-content: center; height: 60vh; flex-direction: column; gap: 16px; color: var(--text-dim); font-size: 13px; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #error-msg { display: none; padding: 40px 28px; color: var(--red); font-size: 13px; }
</style>
</head>
<body>
<header>
  <div class="logo">BRIXTON</div>
  <div class="header-right">
    <div class="branch-label" id="branch-label">—</div>
    <div class="clock" id="clock">—</div>
  </div>
</header>
<div class="date-bar">
  <div class="date-label" id="date-label">—</div>
  <div class="refresh-indicator"><span class="status-dot"></span>обновление каждую минуту</div>
</div>
<div id="loading"><div class="spinner"></div><span>Загружаем расписание…</span></div>
<div id="error-msg"></div>
<div id="board" style="display:none;"></div>
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyqfD8xsp2rkX0eEASg2FoYXbtYpzXlC4TeXoS09RRDjvLDAG6UCNQqcLodVWG5oebzdA/exec';
const BRANCHES = {
  mendeleeva:  { name: 'Менделеева',  companyId: '694866'  },
  entuziastov: { name: 'Энтузиастов', companyId: '1076318' }
};
const params = new URLSearchParams(location.search);
const branchKey = (params.get('branch') || 'mendeleeva').toLowerCase();
const branch = BRANCHES[branchKey] || BRANCHES.mendeleeva;
document.getElementById('branch-label').textContent = branch.name;

function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const d = now.toLocaleDateString('ru-RU', {weekday:'long',day:'numeric',month:'long'});
  document.getElementById('date-label').textContent = d.charAt(0).toUpperCase() + d.slice(1);
}
updateClock();
setInterval(updateClock, 1000);

function statusInfo(visit) {
  if (visit === 1)  return { cls: 'status-visited',  icon: '🟢' };
  if (visit === -1) return { cls: 'status-cancelled', icon: '🔴' };
  return                   { cls: 'status-pending',   icon: '⚪' };
}
function isCurrentSlot(timeStr) {
  const now = new Date();
  const [hh, mm] = timeStr.split(':').map(Number);
  const slotStart = new Date(now); slotStart.setHours(hh, mm, 0, 0);
  return now >= slotStart && now < new Date(slotStart.getTime() + 3600000);
}
function render(staffList) {
  const board = document.getElementById('board');
  board.innerHTML = '';
  if (!staffList || !staffList.length) {
    board.innerHTML = '<div style="padding:40px 28px;color:var(--text-dim)">Нет записей на сегодня</div>';
    return;
  }
  staffList.forEach(staff => {
    const col = document.createElement('div'); col.className = 'col';
    const hdr = document.createElement('div'); hdr.className = 'col-header';
    hdr.innerHTML = `<div class="master-name">${staff.name}</div><div class="master-count">${staff.appointments.length} записей</div>`;
    col.appendChild(hdr);
    const cards = document.createElement('div'); cards.className = 'cards';
    if (!staff.appointments.length) {
      cards.innerHTML = '<div class="empty-col">Нет записей</div>';
    } else {
      staff.appointments.forEach(appt => {
        const st = statusInfo(appt.visit);
        const isNow = isCurrentSlot(appt.time);
        const services = (appt.services || []).join(', ') || '—';
        const card = document.createElement('div');
        card.className = `card ${st.cls}${isNow ? ' is-now' : ''}`;
        card.innerHTML = `<div class="card-time">${appt.time}</div><div class="card-client">${appt.clientName}</div><div class="card-service">${services}</div><div class="card-status">${st.icon}</div>`;
        cards.appendChild(card);
      });
    }
    col.appendChild(cards); board.appendChild(col);
  });
}
