<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>BRIXTON — Расписание</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Mulish:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--gold:#c9a84c;--text:#1a1a1a;--text-dim:#999;--green:#3ecf6e;--red:#e05252;--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18)}
html,body{height:100%;background:#111;color:var(--text);font-family:'Mulish',sans-serif;overflow:hidden;display:flex;flex-direction:column}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:5px 16px;border-bottom:2px solid #000;background:#111;gap:12px;flex-shrink:0}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:4px;color:var(--gold);line-height:1}
.branch-label{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;color:rgba(255,255,255,0.7)}
.clock{font-size:10px;color:rgba(255,255,255,0.4)}
.date-label{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2px;color:var(--gold)}
.day-btns{display:flex;gap:4px}
.day-btn{font-family:'Mulish',sans-serif;font-size:9px;padding:2px 8px;border-radius:20px;border:1px solid rgba(255,255,255,0.3);background:transparent;color:rgba(255,255,255,0.6);cursor:pointer}
.day-btn.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}
.dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:var(--green);margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
#main{flex:1;overflow:hidden;display:flex;flex-direction:column}
#grid{display:flex;flex:1;overflow:hidden}
.time-col{width:48px;flex-shrink:0;background:#1a1a1a;display:flex;flex-direction:column;overflow:hidden}
.time-col.left{border-right:1px solid #444}
.time-col.right{border-left:1px solid #444}
.time-ph{flex-shrink:0;background:#111;border-bottom:1px solid #444}
.time-slots{flex:1;position:relative;overflow:hidden}
.time-slot{position:absolute;left:0;right:0;display:flex;align-items:flex-start;justify-content:flex-end;padding:2px 5px 0 0;font-family:'Bebas Neue',sans-serif;font-size:12px;color:var(--gold);letter-spacing:1px}
#cols{display:flex;flex:1;overflow:hidden}
.master-col{flex:1;border-left:1px solid var(--border2);display:flex;flex-direction:column;min-width:0;overflow:hidden}
.master-head{background:#f0f0f0;border-bottom:2px solid var(--gold);padding:5px 8px 4px;flex-shrink:0}
.master-name{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--text);line-height:1}
.master-count{font-size:8px;color:var(--text-dim);margin-top:1px}
.master-body{position:relative;background:#fff;flex:1;overflow:hidden}
.hour-line{position:absolute;left:0;right:0;border-bottom:1px solid rgba(0,0,0,0.08);pointer-events:none}
.hour-minor{position:absolute;left:0;right:0;border-bottom:1px dashed rgba(0,0,0,0.04);pointer-events:none}
.appt{position:absolute;left:2px;right:2px;border-radius:4px;padding:2px 5px;overflow:hidden;border-left:4px solid transparent;border-top:1px solid transparent;border-right:1px solid transparent;border-bottom:1px solid transparent}
.appt.sv{background:#5ddb8a;border-left-color:#1a8a40;border-top-color:#2aaa55;border-right-color:#2aaa55;border-bottom-color:#2aaa55;z-index:3}
.appt.sc{background:#f08080;border-left-color:#aa1111;border-top-color:#cc3333;border-right-color:#cc3333;border-bottom-color:#cc3333;z-index:1}
.appt.sp{background:#c8c8e8;border-left-color:#6666aa;border-top-color:#8888bb;border-right-color:#8888bb;border-bottom-color:#8888bb;z-index:2}
.appt.early{background:#ffe066;border-left-color:#b38a00;border-top-color:#d4a800;border-right-color:#d4a800;border-bottom-color:#d4a800;z-index:2}
.appt.now-slot{border-color:var(--gold)!important}
.appt-time{font-family:'Bebas Neue',sans-serif;line-height:1}
.appt.sv .appt-time{color:#073a18}
.appt.sc .appt-time{color:#4a0000}
.appt.sp .appt-time{color:#222244}
.appt.early .appt-time{color:#5a3d00}
.appt-name{font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.appt.sv .appt-name{color:#052a10}
.appt.sc .appt-name{color:#380000}
.appt.sp .appt-name{color:#111133}
.appt.early .appt-name{color:#3a2800}
.appt-svc{line-height:1.15;overflow:hidden;white-space:normal;word-break:break-word}
.appt.sv .appt-svc{color:#0a4a1a}
.appt.sc .appt-svc{color:#5a0a0a}
.appt.sp .appt-svc{color:#333355}
.appt.early .appt-svc{color:#5a3a00}
.appt-icon{position:absolute;top:3px;right:3px}
.badge-new{background:#1a55aa;color:#fff;font-size:7px;padding:1px 3px;border-radius:2px;margin-left:2px;font-weight:700;vertical-align:middle}
.badge-v{font-size:9px;margin-left:2px;vertical-align:middle;color:rgba(0,0,0,0.4)}
#now-line{position:absolute;left:0;right:0;height:2px;background:var(--red);z-index:30;pointer-events:none}
#now-line::before{content:'';position:absolute;left:-4px;top:-4px;width:10px;height:10px;border-radius:50%;background:var(--red)}
#loading{display:flex;align-items:center;justify-content:center;flex:1;flex-direction:column;gap:16px;color:var(--text-dim)}
.spinner{width:28px;height:28px;border:2px solid #444;border-top-color:var(--gold);border-radius:50%;animation:spin 0.9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#err{display:none;padding:40px;color:var(--red)}
#bottombar{height:12px;background:#111;border-top:2px solid #333;flex-shrink:0}
</style>
</head>
<body>
<div id="topbar">
  <div class="logo">BRIXTON</div>
  <div class="date-label" id="dl">—</div>
  <div class="day-btns">
    <button class="day-btn" onclick="setDay(-1)">Вчера</button>
    <button class="day-btn active" onclick="setDay(0)">Сегодня</button>
    <button class="day-btn" onclick="setDay(1)">Завтра</button>
  </div>
  <div class="day-btns" style="margin-left:8px;border-left:1px solid rgba(255,255,255,0.2);padding-left:8px">
    <button class="day-btn" id="btn-mendeleeva" onclick="setBranch('mendeleeva')">Менделеева</button>
    <button class="day-btn" id="btn-entuziastov" onclick="setBranch('entuziastov')">Энтузиастов</button>
  </div>
  <div style="font-size:9px;color:rgba(255,255,255,0.4)"><span class="dot"></span>авто</div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px">
    <div class="branch-label" id="bl">—</div>
    <div class="clock" id="cl">—</div>
  </div>
</div>
<div id="loading"><div class="spinner"></div><span style="color:rgba(255,255,255,0.4)">Загружаем расписание…</span></div>
<div id="err"></div>
<div id="main" style="display:none">
  <div id="grid">
    <div class="time-col left" id="tcl">
      <div class="time-ph" id="tcl-ph"></div>
      <div class="time-slots" id="tcl-slots"></div>
    </div>
    <div id="cols"></div>
    <div class="time-col right" id="tcr">
      <div class="time-ph" id="tcr-ph"></div>
      <div class="time-slots" id="tcr-slots"></div>
    </div>
  </div>
</div>
<div id="bottombar"></div>
<script>
var API='https://script.google.com/macros/s/AKfycbyqfD8xsp2rkX0eEASg2FoYXbtYpzXlC4TeXoS09RRDjvLDAG6UCNQqcLodVWG5oebzdA/exec';
var BR={mendeleeva:{name:'Менделеева',cid:'694866'},entuziastov:{name:'Энтузиастов',cid:'1076318'}};
var p=new URLSearchParams(location.search);
var bk=(p.get('branch')||'mendeleeva').toLowerCase();
var br=BR[bk]||BR.mendeleeva;
var dayOffset=0;
var DAY_START=10,DAY_END=21,HOURS=11;
var HOUR=0,HEAD_H=0;
document.getElementById('bl').textContent=br.name;
document.getElementById('btn-'+bk).classList.add('active');

function getTargetDate(o){var d=new Date();d.setDate(d.getDate()+o);return d;}
function formatDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function addMins(t,m){var p=t.split(':').map(Number),tot=p[0]*60+p[1]+m;return String(Math.floor(tot/60)%24).padStart(2,'0')+':'+String(tot%60).padStart(2,'0');}
function timeToY(t){var p=t.split(':').map(Number);return(p[0]-DAY_START)*HOUR+(p[1]/60)*HOUR;}

function tick(){
  var n=new Date();
  document.getElementById('cl').textContent=n.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  var t=getTargetDate(dayOffset);
  var d=t.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('dl').textContent=d.charAt(0).toUpperCase()+d.slice(1);
  updateNowLine();
}
tick();setInterval(tick,1000);

function setBranch(key){
  bk=key;br=BR[key]||BR.mendeleeva;
  document.getElementById('bl').textContent=br.name;
  document.querySelectorAll('#btn-mendeleeva,#btn-entuziastov').forEach(function(b){b.classList.remove('active');});
  document.getElementById('btn-'+key).classList.add('active');
  load();
}
function setDay(o){
  dayOffset=o;
  document.querySelectorAll('.day-btn').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.day-btn')[o+1].classList.add('active');
  load();
}
function si(v,paid){
  var s='display:inline-block;width:13px;height:13px;border-radius:50%;text-align:center;font-size:10px;font-weight:900;line-height:13px;';
  if(v===1){return{c:'sv',i:'<span style="'+s+'background:#1a7a38;color:#fff">'+(paid?'+':'')+'</span>'};}
  if(v===-1)return{c:'sc',i:'<span style="'+s+'background:#aa1111;color:#fff">−</span>'};
  return{c:'sp',i:'<span style="'+s+'background:#6666aa;color:#fff">·</span>'};
}
function isNow(t){
  if(dayOffset!==0)return false;
  var n=new Date(),a=t.split(':').map(Number),s=new Date(n);
  s.setHours(a[0],a[1],0,0);return n>=s&&n<new Date(s.getTime()+3600000);
}
function isEarly(t,v){
  if(v!==1||dayOffset!==0)return false;
  var n=new Date(),a=t.split(':').map(Number),s=new Date(n);
  s.setHours(a[0],a[1],0,0);return n<s;
}
function updateNowLine(){
  var l=document.getElementById('now-line');
  if(!l||!HOUR)return;
  if(dayOffset!==0){l.style.display='none';return;}
  var n=new Date(),h=n.getHours(),m=n.getMinutes();
  if(h<DAY_START||h>=DAY_END){l.style.display='none';return;}
  l.style.display='block';
  l.style.top=(timeToY(String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'))+HEAD_H)+'px';
}

// Умный подбор: всегда показываем услугу, уменьшаем шрифт
function fitText(card,h){
  var te=card.querySelector('.appt-time');
  var ne=card.querySelector('.appt-name');
  var se=card.querySelector('.appt-svc');
  var sets=[[14,12,11],[12,11,10],[11,10,9],[10,9,8],[9,8,8]];
  for(var i=0;i<sets.length;i++){
    if(te)te.style.fontSize=sets[i][0]+'px';
    if(ne)ne.style.fontSize=sets[i][1]+'px';
    if(se)se.style.fontSize=sets[i][2]+'px';
    if(card.scrollHeight<=h)return;
  }
}

function buildSlots(slotsEl){
  slotsEl.innerHTML='';
  for(var h=DAY_START;h<=DAY_END;h++){
    var s=document.createElement('div');
    s.className='time-slot';
    s.style.top=((h-DAY_START)*HOUR)+'px';
    s.style.height=HOUR+'px';
    s.textContent=String(h).padStart(2,'0')+':00';
    slotsEl.appendChild(s);
  }
}

function render(list){
  // Считаем высоту
  var mainEl=document.getElementById('main');
  var gridH=mainEl.offsetHeight;
  HEAD_H=32;
  // Делим на HOURS+1 чтобы последняя метка 21:00 была видна
  HOUR=Math.max(30,Math.floor((gridH-HEAD_H)/(HOURS+0.5)));

  // Временные шкалы
  var phH=HEAD_H+'px';
  document.getElementById('tcl-ph').style.height=phH;
  document.getElementById('tcr-ph').style.height=phH;
  buildSlots(document.getElementById('tcl-slots'));
  buildSlots(document.getElementById('tcr-slots'));

  var colsEl=document.getElementById('cols');
  colsEl.innerHTML='';
  var nowLine=document.createElement('div');
  nowLine.id='now-line';nowLine.style.display='none';
  var totalH=HOURS*HOUR;
  var allCards=[];

  list.forEach(function(s){
    var mc=document.createElement('div');mc.className='master-col';
    var hd=document.createElement('div');hd.className='master-head';
    hd.innerHTML='<div class="master-name">'+s.name+'</div><div class="master-count">'+s.appointments.length+' зап.</div>';
    mc.appendChild(hd);
    var bd=document.createElement('div');bd.className='master-body';
    bd.style.height=totalH+'px';
    // Линии
    for(var h=0;h<=HOURS;h++){
      var ln=document.createElement('div');ln.className='hour-line';ln.style.top=(h*HOUR)+'px';bd.appendChild(ln);
      if(h<HOURS){for(var m=1;m<3;m++){var mn=document.createElement('div');mn.className='hour-minor';mn.style.top=(h*HOUR+m*HOUR/3)+'px';bd.appendChild(mn);}}
    }
    s.appointments.forEach(function(a){
      if(!a.time)return;
      var parts=a.time.split(':').map(Number);
      if(parts[0]<DAY_START||parts[0]>=DAY_END)return;
      var y=timeToY(a.time);
      var dur=a.duration||60;
      var cH=Math.max(dur/60*HOUR,28)-2;
      var end=addMins(a.time,dur);
      var st=si(a.visit,a.paid);
      if(isEarly(a.time,a.visit))st.c='early';
      var nc=(isNow(a.time)&&a.visit!==-1)?' now-slot':'';
      var svc=(a.services||[]).join(', ')||'—';
      var bdg=a.isNew?'<span class="badge-new">NEW</span>':'<span class="badge-v">'+a.visits+'v</span>';
      var card=document.createElement('div');
      card.className='appt '+st.c+nc;
      card.style.top=(y+1)+'px';
      card.style.height=cH+'px';
      card.innerHTML='<div class="appt-time">'+a.time+' — '+end+'</div><div class="appt-name">'+a.clientName+bdg+'</div><div class="appt-svc">'+svc+'</div><div class="appt-icon">'+st.i+'</div>';
      bd.appendChild(card);
      allCards.push({el:card,h:cH});
    });
    mc.appendChild(bd);colsEl.appendChild(mc);
  });
  colsEl.appendChild(nowLine);

  setTimeout(function(){
    var hEl=document.querySelector('.master-head');
    if(hEl)HEAD_H=hEl.offsetHeight;
    allCards.forEach(function(item){fitText(item.el,item.h);});
    updateNowLine();
  },50);
}

function load(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('main').style.display='none';
  document.getElementById('err').style.display='none';
  fetch(API+'?action=getTodaySchedule&company_id='+br.cid+'&date='+formatDate(getTargetDate(dayOffset)))
  .then(function(r){return r.json();})
  .then(function(j){
    document.getElementById('loading').style.display='none';
    document.getElementById('main').style.display='flex';
    render(j.data||[]);
  })
  .catch(function(e){
    document.getElementById('loading').style.display='none';
    document.getElementById('err').style.display='block';
    document.getElementById('err').textContent='Ошибка: '+e.message;
  });
}
load();setInterval(load,60000);
</script>
</body>
</html>
